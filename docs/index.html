<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Believe It! - Interactive Project Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        .gantt-grid {
            background-image: 
                linear-gradient(to right, #cbd5e1 1px, transparent 1px),
                linear-gradient(to bottom, #cbd5e1 1px, transparent 1px);
        }

        .task-bar {
            cursor: grab;
            touch-action: none;
            user-select: none;
            overflow: visible !important;
        }
        .task-bar:active { cursor: grabbing; }
        
        /* Resize Handles */
        .resize-handle-l, .resize-handle-r {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 8px;
            cursor: ew-resize;
            z-index: 20;
            background: rgba(0,0,0,0.1);
        }
        .resize-handle-l { left: 0; }
        .resize-handle-r { right: 0; }

        .editable-input {
            background: white;
            color: black;
            border: none;
            outline: 2px solid #4f46e5;
            border-radius: 4px;
            width: 100%;
            min-width: 180px; /* Ensures input is usable even on 1-day tasks */
            padding: 0 4px;
            font-weight: inherit;
            position: relative;
            z-index: 60;
        }

        .delete-confirm-overlay {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
        }

        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; border: 2px solid #f1f1f1; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
        }

        /* Label styling with heavy centered shadow for legibility */
        .task-label-container {
            position: absolute;
            left: 12px;
            right: -300px;
            pointer-events: none;
            white-space: nowrap;
            /* Heavy centered shadow (glow effect) */
            text-shadow: 
                0 0 4px rgba(0,0,0,0.9), 
                0 0 2px rgba(0,0,0,1),
                0 0 1px rgba(0,0,0,1),
                0 0 3px rgba(0,0,0,1),
                0 0 8px rgba(0,0,0,0.4);
            color: white;
        }

        /* Styling the native color picker to look like a button */
        .native-color-picker {
            width: 32px;
            height: 32px;
            padding: 0;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        .native-color-picker::-webkit-color-swatch-wrapper {
            padding: 4px;
        }
        .native-color-picker::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { h, render, Component } from 'https://esm.sh/preact';
        import { useState, useEffect, useRef, useCallback, useMemo } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(h);

        const DAY_WIDTH_BASE = 40;
        const ROW_HEIGHT = 60;
        const STORAGE_KEY = 'gantt-believe-it-data-v8';

        const JSON_SCHEMA = {
            "$schema": "http://json-schema.org/draft-07/schema#",
            "type": "object",
            "properties": {
                "tasks": {
                    "type": "array",
                    "items": {
                        "type": "object",
                        "properties": {
                            "id": { "type": "string" },
                            "name": { "type": "string" },
                            "start": { "type": "number" },
                            "duration": { "type": "number" },
                            "row": { "type": "number" },
                            "color": { "type": "string", "description": "Hex color string" }
                        },
                        "required": ["id", "name", "start", "duration", "row", "color"]
                    }
                },
                "rowLabels": {
                    "type": "array",
                    "items": { "type": "string" }
                }
            },
            "required": ["tasks", "rowLabels"]
        };

        const initialTasks = [
            { id: '1', name: 'Planning Phase', start: 2, duration: 5, row: 0, color: '#6366f1' },
            { id: '2', name: 'Design Concepts', start: 8, duration: 4, row: 1, color: '#10b981' },
            { id: '3', name: 'Testing Phase', start: 10, duration: 3, row: 0, color: '#f59e0b' },
        ];

        const initialRowLabels = ["Strategic Planning", "UX Design"];

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved).tasks : initialTasks;
            });
            const [rowLabels, setRowLabels] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved).rowLabels : initialRowLabels;
            });

            const [zoom, setZoom] = useState(1);
            const [draggingTask, setDraggingTask] = useState(null);
            const [containerScroll, setContainerScroll] = useState({ left: 0, top: 0 });
            const [sidebarWidth, setSidebarWidth] = useState(() => {
                const saved = localStorage.getItem('gantt-sidebar-width');
                return saved ? parseInt(saved, 10) : 250;
            });

            const [editingTaskId, setEditingTaskId] = useState(null);
            const [editingRowIdx, setEditingRowIdx] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [confirmDeleteRowIdx, setConfirmDeleteRowIdx] = useState(null);
            const [isHelpOpen, setIsHelpOpen] = useState(false);
            const [isResizingSidebar, setIsResizingSidebar] = useState(false);
            const [swimlaneMenuOpen, setSwimlaneMenuOpen] = useState(null);
            const [swimlaneInfoOpen, setSwimlaneInfoOpen] = useState(null);
            const [confirmRemoveGaps, setConfirmRemoveGaps] = useState(null);
            const [createGapModal, setCreateGapModal] = useState(null);
            const [gapAfterTaskId, setGapAfterTaskId] = useState(null);
            const [gapDays, setGapDays] = useState(1);
            
            const dayWidth = DAY_WIDTH_BASE * zoom;
            const containerRef = useRef(null);
            const fileInputRef = useRef(null);
            
            const dragInfo = useRef({ 
                task: null, startX: 0, startY: 0, offsetX: 0, offsetY: 0, 
                hasMoved: false, mode: 'move', originalStart: 0, originalDuration: 0
            });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks, rowLabels }));
            }, [tasks, rowLabels]);

            useEffect(() => {
                localStorage.setItem('gantt-sidebar-width', sidebarWidth.toString());
            }, [sidebarWidth]);

            useEffect(() => {
                const handleClickOutside = (e) => {
                    if (editingTaskId) {
                        const isTaskElement = e.target.closest(`[data-task-id="${editingTaskId}"]`);
                        const isToolbar = e.target.closest('.edit-toolbar');
                        if (!isTaskElement && !isToolbar) {
                            setEditingTaskId(null);
                            setConfirmDeleteId(null);
                        }
                    }
                    if (editingRowIdx !== null) {
                        const isRowElement = e.target.closest(`[data-row-idx="${editingRowIdx}"]`);
                        if (!isRowElement) {
                            setEditingRowIdx(null);
                            setConfirmDeleteRowIdx(null);
                        }
                    }
                    const isSwimlaneMenu = e.target.closest('.swimlane-menu');
                    if (swimlaneMenuOpen !== null && !isSwimlaneMenu) setSwimlaneMenuOpen(null);
                };
                window.addEventListener('mousedown', handleClickOutside);
                return () => window.removeEventListener('mousedown', handleClickOutside);
            }, [editingTaskId, editingRowIdx, swimlaneMenuOpen, swimlaneInfoOpen, confirmRemoveGaps]);

            const exportData = () => {
                const data = JSON.stringify({ tasks, rowLabels }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `gantt-export-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if (json.tasks && json.rowLabels) {
                            setTasks(json.tasks);
                            setRowLabels(json.rowLabels);
                        }
                    } catch (err) { console.error(err); }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            const takeSnapshot = () => {
                const element = document.getElementById('gantt-container');
                const clone = element.cloneNode(true);
                clone.style.position = 'absolute';
                clone.style.top = '-9999px';
                clone.style.left = '-9999px';
                clone.style.width = element.scrollWidth + 'px';
                clone.style.height = element.scrollHeight + 'px';
                clone.style.overflow = 'visible';
                document.body.appendChild(clone);

                html2canvas(clone, {
                    scale: 1,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: '#ffffff'
                }).then(canvas => {
                    document.body.removeChild(clone);
                    const link = document.createElement('a');
                    link.download = `gantt-snapshot-${new Date().toISOString().split('T')[0]}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }).catch(err => {
                    document.body.removeChild(clone);
                    console.error('Snapshot failed:', err);
                });
            };

            const addTask = () => {
                let currentLabels = [...rowLabels];
                if (currentLabels.length === 0) {
                    currentLabels = ["General Tasks"];
                    setRowLabels(currentLabels);
                }
                const firstLaneTasks = tasks.filter(t => t.row === 0);
                let newStart = 0;
                if (firstLaneTasks.length > 0) {
                    newStart = Math.max(...firstLaneTasks.map(t => t.start + t.duration));
                } else {
                    newStart = Math.floor(containerScroll.left / dayWidth);
                }
                const newId = Date.now().toString();
                const newTask = {
                    id: newId,
                    name: 'New Task',
                    start: newStart,
                    duration: 4,
                    row: 0,
                    color: '#6366f1'
                };
                setTasks([...tasks, newTask]);
                setEditingTaskId(newId);
            };

            const updateTaskName = (id, name) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, name } : t));
            };

            const updateTaskColor = (id, color) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, color } : t));
            };

            const updateRowLabel = (idx, label) => {
                const newLabels = [...rowLabels];
                newLabels[idx] = label;
                setRowLabels(newLabels);
            };

            const startSidebarResize = (e) => {
                setIsResizingSidebar(true);
                document.body.style.userSelect = 'none';
                const handleResize = (e) => {
                    const newWidth = Math.max(150, Math.min(600, e.clientX));
                    setSidebarWidth(newWidth);
                };
                const stopResize = () => {
                    setIsResizingSidebar(false);
                    document.body.style.userSelect = '';
                    window.removeEventListener('mousemove', handleResize);
                    window.removeEventListener('mouseup', stopResize);
                };
                window.addEventListener('mousemove', handleResize);
                window.addEventListener('mouseup', stopResize);
            };

            const finalizeMove = (movedTask) => {
                setTasks(prevTasks => {
                    let otherTasks = prevTasks.filter(t => t.id !== movedTask.id);
                    let rowTasks = otherTasks.filter(t => t.row === movedTask.row).sort((a, b) => a.start - b.start);


                    // Find the drop target (task B) - the task under the drop
                    let targetIdx = rowTasks.findIndex(t =>
                        movedTask.start >= t.start && movedTask.start < t.start + t.duration
                    );
                    let newStart;
                    let insertAt;
                    if (targetIdx !== -1) {
                        // Dropped over a task: insert after it
                        const target = rowTasks[targetIdx];
                        newStart = target.start + target.duration;
                        insertAt = targetIdx + 1;
                    } else {
                        // Not dropped over a task: find where to insert by start
                        insertAt = rowTasks.findIndex(t => movedTask.start < t.start);
                        if (insertAt === -1) {
                            // Dropped after all tasks: use the drop position
                            newStart = movedTask.start;
                            insertAt = rowTasks.length;
                        } else {
                            // Dropped before the first task that starts after movedTask
                            newStart = movedTask.start;
                        }
                    }

                    // Insert movedTask at the correct place
                    const updatedMovedTask = { ...movedTask, start: newStart };
                    let newRowTasks = [...rowTasks];
                    newRowTasks.splice(insertAt, 0, updatedMovedTask);

                    // Now push all tasks in the row to the right as needed (no overlaps)
                    for (let i = 1; i < newRowTasks.length; i++) {
                        const prev = newRowTasks[i - 1];
                        if (newRowTasks[i].start < prev.start + prev.duration) {
                            newRowTasks[i].start = prev.start + prev.duration;
                        }
                    }

                    // Merge back with otherTasks (not in this row)
                    let newTaskList = [
                        ...otherTasks.filter(t => t.row !== movedTask.row),
                        ...newRowTasks
                    ];
                    // Sort for display
                    newTaskList.sort((a, b) => (a.row !== b.row) ? a.row - b.row : a.start - b.start);
                    return [...newTaskList];
                });
            };

            const handleMouseMove = useCallback((e) => {
                if (!dragInfo.current.task) return;
                const dx = Math.abs(e.clientX - dragInfo.current.startX);
                const dy = Math.abs(e.clientY - dragInfo.current.startY);
                if (dx > 3 || dy > 3) dragInfo.current.hasMoved = true;
                if (!dragInfo.current.hasMoved) return;

                const containerRect = containerRef.current.getBoundingClientRect();
                const mouseX = e.clientX - containerRect.left - sidebarWidth + containerRef.current.scrollLeft;
                const mouseY = e.clientY - containerRect.top - 48 + containerRef.current.scrollTop;
                const currentDay = Math.floor(mouseX / dayWidth);

                let updated = { ...dragInfo.current.task };
                if (dragInfo.current.mode === 'resize-r') {
                    updated.duration = Math.max(1, currentDay - dragInfo.current.task.start + 1);
                } else if (dragInfo.current.mode === 'resize-l') {
                    const originalEnd = dragInfo.current.originalStart + dragInfo.current.originalDuration;
                    const newStart = Math.min(originalEnd - 1, Math.max(0, currentDay));
                    updated.start = newStart;
                    updated.duration = originalEnd - newStart;
                } else {
                    updated.start = Math.max(0, Math.floor((mouseX - dragInfo.current.offsetX) / dayWidth));
                    updated.row = Math.max(0, Math.min(rowLabels.length - 1, Math.floor(mouseY / ROW_HEIGHT)));
                }
                dragInfo.current.task = updated;
                setDraggingTask(updated);
            }, [dayWidth, rowLabels.length, sidebarWidth]);

            const handleMouseUp = useCallback(() => {
                if (dragInfo.current.task) {
                    if (dragInfo.current.hasMoved) finalizeMove(dragInfo.current.task);
                    else setEditingTaskId(dragInfo.current.task.id);
                }
                dragInfo.current.task = null;
                setDraggingTask(null);
                window.removeEventListener('mousemove', handleMouseMove);
                window.removeEventListener('mouseup', handleMouseUp);
            }, [handleMouseMove]);

            const onMouseDown = (e, task) => {
                if (e.target.closest('.edit-toolbar') || e.target.closest('.delete-confirm-overlay')) return;
                if (editingTaskId && editingTaskId !== task.id) return;

                const rect = e.currentTarget.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const isNearLeft = clickX < 10;
                const isNearRight = clickX > rect.width - 10;
                const isResizeL = isNearLeft || e.target.classList.contains('resize-handle-l');
                const isResizeR = isNearRight || e.target.classList.contains('resize-handle-r');

                dragInfo.current = {
                    task: task, startX: e.clientX, startY: e.clientY, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
                    hasMoved: false, mode: isResizeL ? 'resize-l' : (isResizeR ? 'resize-r' : 'move'),
                    originalStart: task.start, originalDuration: task.duration
                };
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseup', handleMouseUp);
            };

            const projectEndDay = useMemo(() => tasks.length > 0 ? Math.max(...tasks.map(t => t.start + t.duration)) : 0, [tasks]);
            const totalDaysCount = Math.max(90, projectEndDay);
            const timelineDays = Array.from({ length: totalDaysCount }, (_, i) => i);

            return html`
                <div id="gantt-container" class="flex flex-col h-screen overflow-auto text-slate-800">
                    <header class="bg-white border-b px-6 py-4 flex items-center justify-between shadow-sm" style="position: sticky; top: 0; left: 0; z-index: 50;">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-600 p-2 rounded-lg shadow-inner">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h2a2 2 0 00-2 2"></path></svg>
                            </div>
                            <h1 class="text-xl font-bold tracking-tight text-slate-900 font-serif italic">Gantt Believe It!</h1>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <div class="flex items-center bg-slate-100 rounded-lg p-1 border border-slate-200">
                                <button onClick=${() => setZoom(Math.max(0.4, zoom - 0.2))} class="px-3 py-1 hover:bg-white rounded-md transition-all text-xs font-bold active:scale-95">Zoom Out</button>
                                <span class="px-3 text-xs font-black text-indigo-600 w-16 text-center">${Math.round(zoom * 100)}%</span>
                                <button onClick=${() => setZoom(Math.min(2.5, zoom + 0.2))} class="px-3 py-1 hover:bg-white rounded-md transition-all text-xs font-bold active:scale-95">Zoom In</button>
                            </div>
                            <div class="h-8 w-px bg-slate-200 mx-1"></div>
                            <div class="flex gap-2">
                                <button onClick=${exportData} class="bg-white border border-slate-200 hover:border-slate-300 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold transition-all shadow-sm active:scale-95">Export</button>
                                <button onClick=${() => fileInputRef.current.click()} class="bg-white border border-slate-200 hover:border-slate-300 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold transition-all shadow-sm active:scale-95">Import</button>
                                <input type="file" ref=${fileInputRef} style="display: none" accept=".json" onChange=${importData} />
                                <button onClick=${takeSnapshot} class="bg-white border border-slate-200 hover:border-slate-300 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold transition-all shadow-sm active:scale-95">Snapshot</button>
                                <button onClick=${addTask} class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-bold transition-all shadow-md active:scale-95">+ Add Task</button>
                            </div>
                        </div>
                    </header>

                    <div class="flex-1 flex overflow-visible relative" ref=${containerRef}>
                        <div class="bg-white border-r flex-shrink-0 flex flex-col shadow-xl relative" style="position: sticky; left: 0; z-index: 1001; width: ${sidebarWidth}px;">
                            <div class="h-12 border-b bg-slate-50 flex items-center px-4 text-[12px] font-black text-slate-400 uppercase tracking-widest">Swimlanes</div>
                            <div class="flex-1 overflow-y-auto overflow-x-hidden relative">
                                <div onMouseDown=${startSidebarResize} class="absolute right-0 top-0 bottom-0 w-4 bg-gray-100 cursor-ew-resize z-10"></div>
                                <div style="transform: translateY(${-containerScroll.top}px)">
                                    ${rowLabels.map((label, i) => {
                                        const laneTasks = tasks.filter(t => t.row === i);
                                        const hasTasks = laneTasks.length > 0;
                                        const startDay = hasTasks ? Math.min(...laneTasks.map(t => t.start)) + 1 : 0;
                                        const endDay = hasTasks ? Math.max(...laneTasks.map(t => t.start + t.duration)) : 0;
                                        return html`
                                            <div key=${i} data-row-idx=${i} class="h-[60px] border-b flex flex-col justify-center px-4 group hover:bg-indigo-50/50 transition-colors relative">
                                                ${editingRowIdx === i
                                                    ? html`<div class="flex flex-col w-full">
                                                        <input autoFocus onFocus=${e => e.target.select()} class="editable-input text-sm font-bold mb-1" value=${label} onInput=${(e) => updateRowLabel(i, e.target.value)} onKeyDown=${(e) => e.key === 'Enter' && setEditingRowIdx(null)} />
                                                        <button onMouseDown=${(e) => { e.stopPropagation(); setConfirmDeleteRowIdx(i); }} class="text-[9px] text-rose-500 font-bold hover:underline w-fit">🗑️ Delete Lane</button>
                                                    </div>`
                                                    : html`<div class="flex-1 flex items-center justify-between cursor-pointer select-none py-1">
                                                        <div onClick=${() => setEditingRowIdx(i)} class="flex flex-col">
                                                            <span class="text-sm font-bold text-slate-700 truncate">${label}</span>
                                                            <span class="text-[12px] text-slate-400 font-medium">${hasTasks ? `Days ${startDay}-${endDay}` : 'No tasks scheduled'}</span>
                                                        </div>
                                                        <button onClick=${(e) => { e.stopPropagation(); setSwimlaneMenuOpen(i); }} class="font-bold text-slate-400 hover:text-slate-600 p-1 rounded">...</button>
                                                    </div>`
                                                }
                                                ${confirmDeleteRowIdx === i && html`<div class="absolute inset-0 bg-white/95 z-50 flex items-center justify-center gap-2 px-2">
                                                    <span class="text-[12px] font-bold text-slate-500 uppercase">Delete?</span>
                                                    <button onMouseDown=${() => {
                                                        const newLabels = rowLabels.filter((_, idx) => idx !== i);
                                                        setRowLabels(newLabels);
                                                        setTasks(tasks.filter(t => t.row !== i).map(t => t.row > i ? { ...t, row: t.row - 1 } : t));
                                                        setConfirmDeleteRowIdx(null);
                                                        setEditingRowIdx(null);
                                                    }} class="bg-rose-600 text-white text-[12px] px-2 py-1 rounded">Yes</button>
                                                    <button onMouseDown=${() => setConfirmDeleteRowIdx(null)} class="bg-slate-200 text-slate-700 text-[12px] px-2 py-1 rounded">No</button>
                                                </div>`}
                                                ${swimlaneMenuOpen === i && html`<div class="swimlane-menu absolute right-2 top-2 bg-white border shadow rounded p-1 z-10">
                                                    <button onClick=${() => { setSwimlaneMenuOpen(null); setSwimlaneInfoOpen(i); }} class="block w-full text-left px-2 py-1 text-sm hover:bg-gray-100">Info</button>
                                                    <button onClick=${() => { setSwimlaneMenuOpen(null); setCreateGapModal(i); setGapAfterTaskId(null); setGapDays(1); }} class="block w-full text-left px-2 py-1 text-sm hover:bg-gray-100">Create Gap in Swimlane</button>
                                                    <button onClick=${() => { setSwimlaneMenuOpen(null); setConfirmRemoveGaps(i); }} class="block w-full text-left px-2 py-1 text-sm hover:bg-gray-100">Remove Gaps in Swimlane</button>
                                                </div>`}
                                            </div>`;
                                    })}
                                    <button onClick=${() => { const l = `New Lane ${rowLabels.length+1}`; setRowLabels([...rowLabels, l]); setEditingRowIdx(rowLabels.length); }} class="w-full h-[60px] flex items-center justify-center text-xs font-bold text-indigo-600 hover:bg-indigo-50 transition-colors gap-2"><span class="text-lg">+</span> Add Swimlane</button>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 overflow-visible relative bg-white" onScroll=${(e) => setContainerScroll({ left: e.target.scrollLeft, top: e.target.scrollTop })}>
                            <div class="sticky top-0 bg-slate-50 border-b shadow-sm">
                                <div class="flex border-b border-slate-200">
                                    ${Array.from({ length: Math.ceil(totalDaysCount / 5) }).map((_, i) => html`
                                        <div key=${i} style="width: ${dayWidth * 5}px" class="flex-shrink-0 border-r border-slate-200 flex items-center justify-center text-[9px] font-black text-indigo-600 uppercase tracking-widest h-5 bg-indigo-50/30">Week ${i + 1}</div>
                                    `)}
                                </div>
                                <div class="flex h-7">${timelineDays.map(day => html`<div key=${day} style="width: ${dayWidth}px" class="flex-shrink-0 border-r border-slate-200 flex flex-col items-center justify-center text-[9px] font-bold text-slate-400"><span>D${day + 1}</span></div>`)}</div>
                            </div>

                            <div class="gantt-grid relative" style="width: ${totalDaysCount * dayWidth}px; height: ${Math.max(rowLabels.length + 1, 12) * ROW_HEIGHT}px; background-size: ${dayWidth}px ${ROW_HEIGHT}px;">
                                ${tasks.map(task => {
                                    const isDragging = draggingTask && draggingTask.id === task.id;
                                    const isEditing = editingTaskId === task.id;
                                    const displayTask = isDragging ? draggingTask : task;
                                    
                                    const rowTasks = tasks.filter(t => t.row === displayTask.row).sort((a,b)=>a.start-b.start);
                                    const taskIndex = rowTasks.findIndex(t => t.id === displayTask.id);
                                    const hasNextTask = taskIndex < rowTasks.length - 1;
                                    const measureTextWidth = (text, fontSize, fontWeight) => {
                                        const canvas = document.createElement('canvas');
                                        const ctx = canvas.getContext('2d');
                                        ctx.font = `${fontWeight} ${fontSize}px Inter`;
                                        return ctx.measureText(text).width;
                                    };
                                    const nameWidth = measureTextWidth(task.name, 14, 'bold');
                                    const infoWidth = measureTextWidth(`ID: ${task.id}, Days: ${task.duration}`, 12, '500');
                                    const labelWidth = Math.max(nameWidth, infoWidth);
                                    const taskWidth = displayTask.duration * dayWidth - 4;
                                    const shouldRotate = labelWidth > taskWidth && hasNextTask;
                                    
                                    return html`
                                        <div key=${task.id} data-task-id=${task.id} onMouseDown=${(e) => onMouseDown(e, task)}
                                            class="absolute task-bar group rounded-lg border border-black/10 flex flex-col justify-center px-3 text-white shadow-sm ${isDragging ? 'opacity-30 z-0' : 'hover:shadow-lg'}"
                                            style="left: ${displayTask.start * dayWidth + 2}px; top: ${displayTask.row * ROW_HEIGHT + 10}px; width: ${displayTask.duration * dayWidth - 4}px; height: 42px; background-color: ${displayTask.color}; pointer-events: ${isDragging && dragInfo.current.mode === 'move' ? 'none' : 'auto'};">
                                            
                                            <div class="resize-handle-l"></div>
                                            <div class="resize-handle-r"></div>

                                            ${isEditing 
                                                ? html`
                                                    <div class="relative w-full h-full flex items-center">
                                                        <input autoFocus onFocus=${e => e.target.select()} class="editable-input text-xs" value=${task.name} onInput=${(e) => updateTaskName(task.id, e.target.value)} onKeyDown=${(e) => e.key === 'Enter' && setEditingTaskId(null)} />
                                                    </div>
                                                    <!-- Edit Toolbar -->
                                                    <div class="edit-toolbar absolute top-[44px] left-0 w-max min-w-full bg-white border border-slate-200 shadow-xl rounded-lg p-1.5 flex items-center gap-3 z-[60]">
                                                        <button onMouseDown=${(e) => { e.stopPropagation(); setConfirmDeleteId(task.id); }} class="bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white rounded-md p-1.5 transition-colors" title="Delete Task">
                                                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                                                        </button>
                                                        <div class="h-4 w-px bg-slate-200"></div>
                                                        <input 
                                                            type="color" 
                                                            class="native-color-picker" 
                                                            value=${task.color} 
                                                            onInput=${(e) => updateTaskColor(task.id, e.target.value)} 
                                                            title="Pick Task Color"
                                                        />
                                                    </div>
                                                `
                                                : html`
                                                    <div class="task-label-container">
                                                        <div class="text-[12px] font-medium opacity-80 leading-tight" style=${shouldRotate ? 'transform: rotate(-30deg) translateX(0); transform-origin: left center; z-index: 1000;' : ''}>
                                                            ID: ${task.id}
                                                        </div>
                                                        <div class="text-sm font-bold leading-tight">${task.name}</div>
                                                        <div class="text-[12px] font-medium opacity-80 leading-tight">
                                                            ${task.duration} Days
                                                        </div>
                                                    </div>`
                                            }

                                            ${confirmDeleteId === task.id && html`
                                                <div class="absolute inset-0 rounded-lg delete-confirm-overlay z-[70] flex items-center justify-around px-1">
                                                    <button onMouseDown=${(e) => { e.stopPropagation(); setTasks(tasks.filter(t => t.id !== task.id)); setConfirmDeleteId(null); setEditingTaskId(null); }} class="text-[12px] bg-rose-600 text-white px-2 py-1 rounded font-bold">Delete?</button>
                                                    <button onMouseDown=${(e) => { e.stopPropagation(); setConfirmDeleteId(null); }} class="text-[12px] bg-slate-200 text-slate-700 px-2 py-1 rounded font-bold">No</button>
                                                </div>`}
                                        </div>`;
                                })}
                            </div>
                        </div>
                    </div>

                    <footer class="bg-white border-t px-6 py-2 text-[12px] text-slate-400 flex justify-between uppercase tracking-widest font-bold" style="position: sticky; bottom: 0; left: 0; z-index: 50;">
                        <div class="flex gap-8 items-center">
                            <span>Tasks: <span class="text-slate-900">${tasks.length}</span></span>
                            <span>Project Span: <span class="text-slate-900">${projectEndDay} Days</span></span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-emerald-500 font-black">● Auto-Saving</span>
                            <button onClick=${() => setIsHelpOpen(true)} class="bg-slate-800 text-white px-3 py-1 rounded hover:bg-black transition-colors">Help</button>
                        </div>
                    </footer>

                    ${isHelpOpen && html`
                        <div class="fixed inset-0 z-[1100] flex items-center justify-center p-6 modal-overlay" onClick=${() => setIsHelpOpen(false)}>
                            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col" onClick=${e => e.stopPropagation()}>
                                <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                                    <h2 class="text-lg font-bold text-slate-900">User Guide & JSON Schema</h2>
                                    <button onClick=${() => setIsHelpOpen(false)} class="text-slate-400 hover:text-slate-600 text-2xl leading-none">✖</button>
                                </div>
                                <div class="p-6 overflow-y-auto space-y-6">
                                    <section>
                                        <h3 class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-2">Instructions</h3>
                                        <ul class="list-disc list-inside text-sm text-slate-600 space-y-1">
                                            <li><span class="font-bold">Move:</span> Drag the middle of a task bar.</li>
                                            <li><span class="font-bold">Resize:</span> Drag the left or right edge of a task bar.</li>
                                            <li><span class="font-bold">Minimum Size:</span> Tasks cannot be smaller than 1 day.</li>
                                            <li><span class="font-bold">Collision:</span> Rescheduling pushes subsequent tasks to prevent overlap.</li>
                                            <li><span class="font-bold">Management:</span> Add swimlanes or tasks, and click items to edit names.</li>
                                        </ul>
                                    </section>
                                    <section><h3 class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-2">Repo can be found at <a href="https://github.com/andrewfulrich/GanttBelieveIt">github.com/andrewfulrich/GanttBelieveIt</a></h3></section>
                                    <section>
                                        <h3 class="text-indigo-600 font-bold uppercase text-xs tracking-widest mb-2">Import/Export JSON Format</h3>
                                        <pre class="bg-slate-900 text-indigo-300 p-4 rounded-xl text-xs overflow-x-auto leading-relaxed shadow-inner mt-4">
${JSON.stringify(JSON_SCHEMA, null, 2)}
                                        </pre>
                                    </section>
                                </div>
                                <div class="px-6 py-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick=${() => setIsHelpOpen(false)} class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700 transition-colors">Got it</button>
                                </div>
                            </div>
                        </div>
                    `}

                    ${swimlaneInfoOpen !== null && (() => {
                        const laneTasks = tasks.filter(t => t.row === swimlaneInfoOpen).sort((a,b)=>a.start-b.start);
                        const totalStories = laneTasks.length;
                        const startDay = totalStories > 0 ? Math.min(...laneTasks.map(t => t.start)) + 1 : 0;
                        const endDay = totalStories > 0 ? Math.max(...laneTasks.map(t => t.start + t.duration)) : 0;
                        const occupiedDays = new Set();
                        laneTasks.forEach(t => {
                            for(let d=t.start; d<t.start+t.duration; d++) occupiedDays.add(d);
                        });
                        const emptyRanges = [];
                        let inGap = false;
                        let gapStart = null;
                        for(let d=0; d<endDay; d++){
                            if(!occupiedDays.has(d)){
                                if(!inGap){ gapStart = d; inGap=true; }
                            }else{
                                if(inGap){
                                    emptyRanges.push(`${gapStart+1}-${d}`);
                                    inGap=false;
                                }
                            }
                        }
                        if(inGap) emptyRanges.push(`${gapStart+1}-${endDay}`);
                        return html`
                            <div class="fixed inset-0 z-[1100] flex items-center justify-center p-6 modal-overlay" onClick=${() => setSwimlaneInfoOpen(null)}>
                                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col" onClick=${e => e.stopPropagation()}>
                                    <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                                        <h2 class="text-lg font-bold text-slate-900">Swimlane Info</h2>
                                        <button onClick=${() => setSwimlaneInfoOpen(null)} class="text-slate-400 hover:text-slate-600 text-2xl leading-none">✖</button>
                                    </div>
                                    <div class="p-6 space-y-4">
                                        <div><strong>Swimlane:</strong> ${rowLabels[swimlaneInfoOpen]}</div>
                                        <div><strong>Total Stories:</strong> ${totalStories}</div>
                                        <div><strong>Start Day:</strong> D${startDay}</div>
                                        <div><strong>End Day:</strong> D${endDay}</div>
                                        <div><strong>Empty Day Ranges:</strong> ${emptyRanges.length > 0 ? emptyRanges.join(', ') : 'None'}</div>
                                    </div>
                                    <div class="px-6 py-4 border-t bg-slate-50 flex justify-end">
                                        <button onClick=${() => setSwimlaneInfoOpen(null)} class="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700 transition-colors">Close</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    })()}

                    ${confirmRemoveGaps !== null && html`
                        <div class="fixed inset-0 z-[1100] flex items-center justify-center p-6 modal-overlay" onClick=${() => setConfirmRemoveGaps(null)}>
                            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col" onClick=${e => e.stopPropagation()}>
                                <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                                    <h2 class="text-lg font-bold text-slate-900">Confirm Action</h2>
                                    <button onClick=${() => setConfirmRemoveGaps(null)} class="text-slate-400 hover:text-slate-600 text-2xl leading-none">✖</button>
                                </div>
                                <div class="p-6">
                                    <p class="text-sm text-slate-600">This action will move stories up in the swimlane to eliminate any 'gap days', or days that have no tasks. This will affect the entire swimlane. Are you sure you want to do this?</p>
                                </div>
                                <div class="px-6 py-4 border-t bg-slate-50 flex justify-end gap-2">
                                    <button onClick=${() => setConfirmRemoveGaps(null)} class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">Cancel</button>
                                    <button onClick=${() => {
                                        setTasks(prevTasks => {
                                            console.log('what')
                                            const laneTasks = prevTasks.filter(t => t.row === confirmRemoveGaps).sort((a,b)=>a.start-b.start);
                                            if(laneTasks.length <=1) return prevTasks;
                                            let prevEnd = laneTasks[0].start + laneTasks[0].duration;
                                            console.log('laneTasks', laneTasks)
                                            console.log('prevEnd',prevEnd)
                                            console.log('prevTasks',prevTasks)
                                            return prevTasks.map(t => {
                                                if(t.row !== confirmRemoveGaps) return t;
                                                const index = laneTasks.findIndex(lt => lt.id === t.id);
                                                if(index === 0) return t;
                                                const newStart = prevEnd;
                                                prevEnd = newStart + t.duration;
                                                return { ...t, start: newStart };
                                            });
                                        });
                                        setConfirmRemoveGaps(null);
                                    }} class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700">Yes, Remove Gaps</button>
                                </div>
                            </div>
                        </div>
                    `}

                    ${createGapModal !== null && (() => {
                        const laneTasks = tasks.filter(t => t.row === createGapModal).sort((a,b)=>a.start-b.start);
                        return html`
                            <div class="fixed inset-0 z-[1100] flex items-center justify-center p-6 modal-overlay" onClick=${() => setCreateGapModal(null)}>
                                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-hidden flex flex-col" onClick=${e => e.stopPropagation()}>
                                    <div class="px-6 py-4 border-b flex justify-between items-center bg-slate-50">
                                        <h2 class="text-lg font-bold text-slate-900">Create Gap</h2>
                                        <button onClick=${() => setCreateGapModal(null)} class="text-slate-400 hover:text-slate-600 text-2xl leading-none">✖</button>
                                    </div>
                                    <div class="p-6 space-y-4">
                                        <div>
                                            <label class="block text-sm font-bold text-slate-700 mb-2">Create gap after story:</label>
                                            <select value=${gapAfterTaskId || ''} onChange=${(e) => setGapAfterTaskId(e.target.value)} class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                                <option value="">Select a story...</option>
                                                ${laneTasks.map(task => html`<option value=${task.id}>${task.name} (ID: ${task.id})</option>`)}
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-sm font-bold text-slate-700 mb-2">Gap duration (days):</label>
                                            <input type="number" min="1" value=${gapDays} onInput=${(e) => setGapDays(Math.max(1, parseInt(e.target.value) || 1))} class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                        </div>
                                    </div>
                                    <div class="px-6 py-4 border-t bg-slate-50 flex justify-end gap-2">
                                        <button onClick=${() => setCreateGapModal(null)} class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold">Cancel</button>
                                        <button onClick=${() => {
                                            if (!gapAfterTaskId) return;
                                            setTasks(prevTasks => {
                                                const laneTasks = prevTasks.filter(t => t.row === createGapModal).sort((a,b)=>a.start-b.start);
                                                const afterTaskIndex = laneTasks.findIndex(t => t.id === gapAfterTaskId);
                                                if (afterTaskIndex === -1 || afterTaskIndex === laneTasks.length - 1) return prevTasks;
                                                
                                                const afterTask = laneTasks[afterTaskIndex];
                                                const gapStart = afterTask.start + afterTask.duration;
                                                
                                                return prevTasks.map(t => {
                                                    if (t.row !== createGapModal) return t;
                                                    const taskIndex = laneTasks.findIndex(lt => lt.id === t.id);
                                                    if (taskIndex <= afterTaskIndex) return t;
                                                    return { ...t, start: t.start + gapDays };
                                                });
                                            });
                                            setCreateGapModal(null);
                                        }} class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700" disabled=${!gapAfterTaskId}>Create Gap</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    })()}
                </div>
            `;
        };

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
